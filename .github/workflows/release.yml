name: Build and Release Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.1). Tag v<version> will be created."
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-build.txt

      - name: Build portable app
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --windowed --name PictureConverter --collect-all fitz --hidden-import PIL._tkinter_finder --distpath dist --workpath build\pyinstaller main.py

      - name: Package zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item README.md release\README.md
          Compress-Archive -Path dist\PictureConverter\* -DestinationPath release\PictureConverter-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picture-converter-windows
          path: release\PictureConverter-portable.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            release/PictureConverter-portable.zip
          generate_release_notes: true
