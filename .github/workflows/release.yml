name: Build and Release Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-build.txt

      - name: Build portable app
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --windowed --name PictureConverter --collect-all fitz --hidden-import PIL._tkinter_finder --distpath dist --workpath build\pyinstaller main.py

      - name: Package zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item README.md release\README.md
          Compress-Archive -Path dist\PictureConverter\* -DestinationPath release\PictureConverter-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picture-converter-windows
          path: release\PictureConverter-portable.zip

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/PictureConverter-portable.zip
          generate_release_notes: true
